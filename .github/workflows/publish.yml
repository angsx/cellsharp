name: Publish NuGet

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
      - run: dotnet restore CellSharp.sln --locked-mode
      - run: dotnet build CellSharp.sln --configuration Release --no-restore
      - run: dotnet test CellSharp.sln --configuration Release --no-build
      - run: dotnet pack src/CellSharp/CellSharp.csproj --configuration Release --no-build --output artifacts
      - name: Get temporary NuGet API key
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Publish package and symbols
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
